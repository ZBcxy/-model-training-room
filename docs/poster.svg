<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" width="1200" height="1800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="1800" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="5" fill="url(#g1)"/>

  <!-- ═══ 头部 ═══ -->
  <text x="600" y="80" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="900" fill="white">模型训练室</text>
  <text x="600" y="140" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#64748b">Model Training Room — 本地化大模型微调一站式工具</text>
  <rect x="460" y="160" width="280" height="32" rx="16" fill="#6366f1" fill-opacity="0.2"/>
  <text x="600" y="182" text-anchor="middle" font-size="16" fill="#818cf8" font-weight="bold">github.com/ZBcxy/-model-training-room</text>

  <!-- ═══ 对比实验（核心证据） ═══ -->
  <text x="600" y="250" text-anchor="middle" font-size="28" font-weight="bold" fill="white">▎三组对照实验</text>
  <text x="600" y="278" text-anchor="middle" font-size="14" fill="#64748b">基础模型 Qwen2.5-1.5B · LoRA (rank=16) · RTX 3060 12GB · BF16</text>

  <!-- 实验卡片 -->
  <g transform="translate(0, 300)">
    <rect x="50" y="0" width="340" height="200" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="50" y="0" width="340" height="36" rx="10" fill="#ef4444" fill-opacity="0.15"/>
    <text x="220" y="24" text-anchor="middle" font-size="17" font-weight="bold" fill="#ef4444">实验 A — 低质量模板数据</text>
    <text x="70" y="70" font-size="14" fill="#94a3b8">数据量: 500 条</text>
    <text x="70" y="95" font-size="14" fill="#94a3b8">数据质量: 模板随机混搭（问答错配）</text>
    <text x="70" y="120" font-size="14" fill="#94a3b8">Loss: 2.09（几乎不下降）</text>
    <text x="70" y="145" font-size="14" fill="#94a3b8">训练: 125 steps · 1.8 分钟</text>
    <rect x="70" y="160" width="300" height="30" rx="6" fill="#ef4444" fill-opacity="0.1"/>
    <text x="220" y="181" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">结果: 答非所问 · 无法使用</text>

    <rect x="430" y="0" width="340" height="200" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="430" y="0" width="340" height="36" rx="10" fill="#eab308" fill-opacity="0.15"/>
    <text x="600" y="24" text-anchor="middle" font-size="17" font-weight="bold" fill="#eab308">实验 B — 手工匹配模板</text>
    <text x="450" y="70" font-size="14" fill="#94a3b8">数据量: 500 条</text>
    <text x="450" y="95" font-size="14" fill="#94a3b8">数据质量: 手工匹配，6个主题</text>
    <text x="450" y="120" font-size="14" fill="#94a3b8">Loss: 0.11（过拟合）</text>
    <text x="450" y="145" font-size="14" fill="#94a3b8">训练: 125 steps · 2.1 分钟</text>
    <rect x="450" y="160" width="300" height="30" rx="6" fill="#eab308" fill-opacity="0.1"/>
    <text x="600" y="181" text-anchor="middle" font-size="14" font-weight="bold" fill="#eab308">结果: 正确但简单 · 泛化差</text>

    <rect x="810" y="0" width="340" height="200" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <rect x="810" y="0" width="340" height="36" rx="10" fill="#22c55e" fill-opacity="0.15"/>
    <text x="980" y="24" text-anchor="middle" font-size="17" font-weight="bold" fill="#22c55e">🏆 实验 C — 真实标注数据</text>
    <text x="830" y="70" font-size="14" fill="#94a3b8">数据量: 10,310 条</text>
    <text x="830" y="95" font-size="14" fill="#94a3b8">数据质量: alpaca-zh + BELLE 真实标注</text>
    <text x="830" y="120" font-size="14" fill="#22c55e">Loss: 1.68 → 1.12（-33.4%）</text>
    <text x="830" y="145" font-size="14" fill="#94a3b8">训练: 2,578 steps · 69 分钟</text>
    <rect x="830" y="160" width="300" height="30" rx="6" fill="#22c55e" fill-opacity="0.1"/>
    <text x="980" y="181" text-anchor="middle" font-size="14" font-weight="bold" fill="#22c55e">✅ 准确 · 丰富 · 可用于生产</text>
  </g>

  <!-- ═══ 真实推理验证 ═══ -->
  <text x="600" y="555" text-anchor="middle" font-size="28" font-weight="bold" fill="white">▎推理实测（Ollama · Q4_K_M · 986MB）</text>

  <g transform="translate(50, 580)">
    <rect x="0" y="0" width="360" height="180" rx="8" fill="#1e293b"/>
    <text x="20" y="28" font-size="14" font-weight="bold" fill="#818cf8">测试 1: 知识问答</text>
    <text x="20" y="52" font-size="12" fill="#94a3b8">Q: 中国四大发明是什么？</text>
    <text x="20" y="74" font-size="12" fill="#cbd5e1">A: 指南针、火药、造纸术和印刷术…</text>
    <text x="20" y="96" font-size="12" fill="#cbd5e1">这些发明对世界文明进程产生了</text>
    <text x="20" y="118" font-size="12" fill="#cbd5e1">深远影响。指南针推动了航海探险…</text>
    <rect x="20" y="138" width="60" height="24" rx="6" fill="#22c55e" fill-opacity="0.2"/>
    <text x="50" y="155" text-anchor="middle" font-size="13" fill="#22c55e">✅ 准确</text>

    <rect x="380" y="0" width="360" height="180" rx="8" fill="#1e293b"/>
    <text x="400" y="28" font-size="14" font-weight="bold" fill="#818cf8">测试 2: 日常对话</text>
    <text x="400" y="52" font-size="12" fill="#94a3b8">Q: 最近压力大，怎么缓解？</text>
    <text x="400" y="74" font-size="12" fill="#cbd5e1">A: 可以试试这些方法：1) 深呼吸</text>
    <text x="400" y="96" font-size="12" fill="#cbd5e1">2) 散步 3) 看喜欢的书 4) 和信任的</text>
    <text x="400" y="118" font-size="12" fill="#cbd5e1">朋友聊聊天。照顾好自己最重要！</text>
    <rect x="380" y="138" width="60" height="24" rx="6" fill="#22c55e" fill-opacity="0.2"/>
    <text x="410" y="155" text-anchor="middle" font-size="13" fill="#22c55e">✅ 人性化</text>

    <rect x="760" y="0" width="360" height="180" rx="8" fill="#1e293b"/>
    <text x="780" y="28" font-size="14" font-weight="bold" fill="#818cf8">测试 3: 技术解释</text>
    <text x="780" y="52" font-size="12" fill="#94a3b8">Q: 介绍一下机器学习的基本概念</text>
    <text x="780" y="74" font-size="12" fill="#cbd5e1">A: 机器学习算法可以分为监督学习、</text>
    <text x="780" y="96" font-size="12" fill="#cbd5e1">无监督学习…常见例子包括聚类分析</text>
    <text x="780" y="118" font-size="12" fill="#cbd5e1">和降维技术…</text>
    <rect x="760" y="138" width="60" height="24" rx="6" fill="#22c55e" fill-opacity="0.2"/>
    <text x="790" y="155" text-anchor="middle" font-size="13" fill="#22c55e">✅ 专业</text>
  </g>

  <!-- ═══ Loss 收敛数据 ═══ -->
  <text x="600" y="820" text-anchor="middle" font-size="28" font-weight="bold" fill="white">▎Loss 收敛全过程（实验 C · 10,310 条数据）</text>

  <g transform="translate(50, 850)">
    <!-- 表头 -->
    <rect x="0" y="0" width="1100" height="32" rx="4" fill="#334155"/>
    <text x="20" y="22" font-size="13" font-weight="bold" fill="white">Step</text>
    <text x="180" y="22" font-size="13" font-weight="bold" fill="white">1</text>
    <text x="340" y="22" font-size="13" font-weight="bold" fill="white">200</text>
    <text x="500" y="22" font-size="13" font-weight="bold" fill="white">400</text>
    <text x="660" y="22" font-size="13" font-weight="bold" fill="white">600</text>
    <text x="820" y="22" font-size="13" font-weight="bold" fill="white">800</text>
    <text x="980" y="22" font-size="13" font-weight="bold" fill="white">1,000</text>

    <rect x="0" y="36" width="1100" height="1" fill="#334155"/>

    <text x="20" y="60" font-size="13" font-weight="bold" fill="#818cf8">Loss</text>
    <text x="180" y="60" font-size="13" fill="white">1.6834</text>
    <text x="340" y="60" font-size="13" fill="white">1.5253</text>
    <text x="500" y="60" font-size="13" fill="white">1.4741</text>
    <text x="660" y="60" font-size="13" fill="white">1.4376</text>
    <text x="820" y="60" font-size="13" fill="white">1.4080</text>
    <text x="980" y="60" font-size="13" fill="white">1.3597</text>

    <rect x="0" y="70" width="1100" height="1" fill="#334155"/>

    <text x="20" y="94" font-size="13" font-weight="bold" fill="#818cf8">ΔLoss</text>
    <text x="180" y="94" font-size="13" fill="#64748b">—</text>
    <text x="340" y="94" font-size="13" fill="#22c55e">-0.1581</text>
    <text x="500" y="94" font-size="13" fill="#22c55e">-0.0512</text>
    <text x="660" y="94" font-size="13" fill="#22c55e">-0.0365</text>
    <text x="820" y="94" font-size="13" fill="#22c55e">-0.0296</text>
    <text x="980" y="94" font-size="13" fill="#22c55e">-0.0483</text>

    <!-- 续 -->
    <rect x="0" y="110" width="1100" height="32" rx="4" fill="#334155"/>
    <text x="20" y="132" font-size="13" font-weight="bold" fill="white">Step</text>
    <text x="180" y="132" font-size="13" font-weight="bold" fill="white">1,200</text>
    <text x="340" y="132" font-size="13" font-weight="bold" fill="white">1,400</text>
    <text x="500" y="132" font-size="13" font-weight="bold" fill="white">1,600</text>
    <text x="660" y="132" font-size="13" font-weight="bold" fill="white">1,800</text>
    <text x="820" y="132" font-size="13" font-weight="bold" fill="white">2,000</text>
    <text x="980" y="132" font-size="13" font-weight="bold" fill="white">2,578 ▲</text>

    <rect x="0" y="146" width="1100" height="1" fill="#334155"/>

    <text x="20" y="170" font-size="13" font-weight="bold" fill="#818cf8">Loss</text>
    <text x="180" y="170" font-size="13" fill="white">1.3183</text>
    <text x="340" y="170" font-size="13" fill="white">1.2860</text>
    <text x="500" y="170" font-size="13" fill="white">1.2699</text>
    <text x="660" y="170" font-size="13" fill="white">1.2433</text>
    <text x="820" y="170" font-size="13" fill="white">1.2097</text>
    <text x="980" y="170" font-size="13" font-weight="bold" fill="#22c55e">1.1156</text>

    <rect x="0" y="180" width="1100" height="1" fill="#334155"/>

    <text x="20" y="204" font-size="13" font-weight="bold" fill="#818cf8">ΔLoss</text>
    <text x="180" y="204" font-size="13" fill="#22c55e">-0.0414</text>
    <text x="340" y="204" font-size="13" fill="#22c55e">-0.0323</text>
    <text x="500" y="204" font-size="13" fill="#22c55e">-0.0161</text>
    <text x="660" y="204" font-size="13" fill="#22c55e">-0.0266</text>
    <text x="820" y="204" font-size="13" fill="#22c55e">-0.0336</text>
    <text x="980" y="204" font-size="13" font-weight="bold" fill="#22c55e">-0.0941</text>
  </g>

  <!-- ═══ 训练效率 ═══ -->
  <text x="600" y="1120" text-anchor="middle" font-size="28" font-weight="bold" fill="white">▎硬件效率与可复现性</text>

  <g transform="translate(50, 1150)">
    <rect x="0" y="0" width="250" height="130" rx="8" fill="#1e293b"/>
    <text x="125" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="white">GPU 占用</text>
    <text x="125" y="60" text-anchor="middle" font-size="28" font-weight="bold" fill="#22c55e">4.2 GB</text>
    <text x="125" y="85" text-anchor="middle" font-size="13" fill="#94a3b8">峰值显存</text>
    <text x="125" y="108" text-anchor="middle" font-size="12" fill="#64748b">RTX 3060 12GB 只用 35%</text>

    <rect x="280" y="0" width="250" height="130" rx="8" fill="#1e293b"/>
    <text x="405" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="white">训练速度</text>
    <text x="405" y="60" text-anchor="middle" font-size="28" font-weight="bold" fill="#22c55e">2.49 条/秒</text>
    <text x="405" y="85" text-anchor="middle" font-size="13" fill="#94a3b8">10K×2epoch = 69分钟</text>
    <text x="405" y="108" text-anchor="middle" font-size="12" fill="#64748b">100K 条 ≈ 11小时</text>

    <rect x="560" y="0" width="250" height="130" rx="8" fill="#1e293b"/>
    <text x="685" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="white">可训参数</text>
    <text x="685" y="60" text-anchor="middle" font-size="28" font-weight="bold" fill="#818cf8">1.0%</text>
    <text x="685" y="85" text-anchor="middle" font-size="13" fill="#94a3b8">LoRA rank=16</text>
    <text x="685" y="108" text-anchor="middle" font-size="12" fill="#64748b">仅训练 1% 参数</text>

    <rect x="840" y="0" width="260" height="130" rx="8" fill="#1e293b"/>
    <text x="970" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="white">部署体积</text>
    <text x="970" y="60" text-anchor="middle" font-size="28" font-weight="bold" fill="#22c55e">986 MB</text>
    <text x="970" y="85" text-anchor="middle" font-size="13" fill="#94a3b8">Q4_K_M 量化</text>
    <text x="970" y="108" text-anchor="middle" font-size="12" fill="#64748b">原始 2.88GB → 32%</text>
  </g>

  <!-- ═══ 结论 ═══ -->
  <g transform="translate(50, 1330)">
    <rect x="0" y="0" width="1100" height="70" rx="8" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-width="1"/>
    <text x="550" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#818cf8">核心发现</text>
    <text x="550" y="54" text-anchor="middle" font-size="18" font-weight="bold" fill="white">
      ① 数据质量 &gt; 数据数量（500条好数据优于500条烂数据）  ② 真实标注 &gt; 模板生成  ③ 消费级GPU完全够用
    </text>
  </g>

  <!-- ═══ 底部 CTA ═══ -->
  <g transform="translate(0, 1460)">
    <text x="600" y="0" text-anchor="middle" font-size="16" fill="#64748b">开源 · MIT License · 26 模型 · 12 族系 · CI 自动测试</text>

    <rect x="300" y="30" width="600" height="60" rx="30" fill="url(#g1)"/>
    <text x="600" y="68" text-anchor="middle" font-size="22" font-weight="bold" fill="white">⭐ github.com/ZBcxy/-model-training-room</text>

    <text x="600" y="120" text-anchor="middle" font-size="14" fill="#475569">支持: Qwen · Llama · DeepSeek · ChatGLM · Mistral · Gemma · Baichuan · Yi · InternLM · MiniCPM · Phi · Orion · XuanYuan</text>

    <rect x="500" y="140" width="200" height="28" rx="14" fill="#6366f1" fill-opacity="0.25"/>
    <text x="600" y="159" text-anchor="middle" font-size="14" font-weight="bold" fill="#818cf8">v0.3.0 · 2026</text>
  </g>
</svg>